services:
  mvd-aggregator:
    build:
      context: .
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/mvd_aggregator/}
    image: mvd-aggregator:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./aliases.json:/app/aliases.json
    ports:
      - "127.0.0.1:${PORT:-3001}:${PORT:-3001}"
    networks:
      - web

networks:
  web:
    external: true
